version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Bucharest
    open-pull-requests-limit: 10
    groups:
      development-toolchain:
        dependency-type: development
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - area:security

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: Europe/Bucharest
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area:ci
