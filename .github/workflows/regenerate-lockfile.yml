name: Regenerate pnpm lockfile

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch that receives the generated pnpm-lock.yaml
        required: true
        default: agent/m0-monorepo-foundation
        type: string

permissions:
  contents: write

concurrency:
  group: regenerate-lockfile-${{ inputs.target_branch }}
  cancel-in-progress: false

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate lockfile
        run: pnpm install --lockfile-only

      - name: Commit lockfile when changed
        run: |
          if git diff --quiet -- pnpm-lock.yaml && git ls-files --error-unmatch pnpm-lock.yaml >/dev/null 2>&1; then
            echo "pnpm-lock.yaml is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: update pnpm lockfile"
          git push origin "HEAD:${{ inputs.target_branch }}"
