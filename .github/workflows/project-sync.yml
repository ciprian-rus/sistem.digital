name: Sync issues to GitHub Project

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      import_existing:
        description: Add all existing open issues to the project
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  issues: read

concurrency:
  group: project-sync-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

env:
  PROJECT_NUMBER: "5"
  # Project #5 is owned by the same personal account that created PROJECTS_TOKEN.
  # GitHub CLI recommends @me for projects owned by the authenticated user.
  PROJECT_OWNER: "@me"

jobs:
  add-current-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Validate Projects token and project access
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing repository secret PROJECTS_TOKEN" >&2
            exit 1
          fi

          gh project view "${PROJECT_NUMBER}" \
            --owner "${PROJECT_OWNER}" \
            --format json \
            --jq '.number' | grep -Fxq "${PROJECT_NUMBER}"

      - name: Add issue when missing
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail

          if gh project item-list "${PROJECT_NUMBER}" \
            --owner "${PROJECT_OWNER}" \
            --limit 500 \
            --format json \
            --jq '.items[].content.url' | grep -Fxq "${ISSUE_URL}"; then
            echo "Issue is already present in the project."
          else
            gh project item-add "${PROJECT_NUMBER}" \
              --owner "${PROJECT_OWNER}" \
              --url "${ISSUE_URL}"
          fi

      - name: Verify issue membership
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail

          gh project item-list "${PROJECT_NUMBER}" \
            --owner "${PROJECT_OWNER}" \
            --limit 500 \
            --format json \
            --jq '.items[].content.url' | grep -Fxq "${ISSUE_URL}"

  import-existing-issues:
    if: github.event_name == 'workflow_dispatch' && inputs.import_existing
    runs-on: ubuntu-latest
    steps:
      - name: Validate Projects token and project access
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing repository secret PROJECTS_TOKEN" >&2
            exit 1
          fi

          gh project view "${PROJECT_NUMBER}" \
            --owner "${PROJECT_OWNER}" \
            --format json \
            --jq '.number' | grep -Fxq "${PROJECT_NUMBER}"

      - name: Add all missing open issues
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          expected_file="$(mktemp)"
          current_file="$(mktemp)"

          gh issue list \
            --repo "${REPOSITORY}" \
            --state open \
            --limit 200 \
            --json url \
            --jq '.[].url' | sort -u > "${expected_file}"

          gh project item-list "${PROJECT_NUMBER}" \
            --owner "${PROJECT_OWNER}" \
            --limit 500 \
            --format json \
            --jq '.items[].content.url' | sort -u > "${current_file}"

          while read -r issue_url; do
            [ -n "${issue_url}" ] || continue

            if grep -Fxq "${issue_url}" "${current_file}"; then
              echo "Already present: ${issue_url}"
            else
              echo "Adding: ${issue_url}"
              gh project item-add "${PROJECT_NUMBER}" \
                --owner "${PROJECT_OWNER}" \
                --url "${issue_url}"
            fi
          done < "${expected_file}"

      - name: Verify all open issues were imported
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          expected_file="$(mktemp)"
          actual_file="$(mktemp)"
          missing_file="$(mktemp)"

          gh issue list \
            --repo "${REPOSITORY}" \
            --state open \
            --limit 200 \
            --json url \
            --jq '.[].url' | sort -u > "${expected_file}"

          gh project item-list "${PROJECT_NUMBER}" \
            --owner "${PROJECT_OWNER}" \
            --limit 500 \
            --format json \
            --jq '.items[].content.url' | sort -u > "${actual_file}"

          comm -23 "${expected_file}" "${actual_file}" > "${missing_file}"

          if [ -s "${missing_file}" ]; then
            echo "The following open issues are missing from Project #${PROJECT_NUMBER}:" >&2
            cat "${missing_file}" >&2
            exit 1
          fi

          issue_count="$(wc -l < "${expected_file}" | tr -d ' ')"
          echo "Verified ${issue_count} open issues in Project #${PROJECT_NUMBER}."
          echo "### Project synchronization" >> "${GITHUB_STEP_SUMMARY}"
          echo "Verified **${issue_count}** open issues in Project #${PROJECT_NUMBER}." >> "${GITHUB_STEP_SUMMARY}"
