name: Visual regression

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: visual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @sistem-digital/website exec playwright install --with-deps chromium

      - name: Build website and workspace dependencies
        run: pnpm --filter @sistem-digital/website... build

      - name: Bootstrap initial screenshots on the internal pull request
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          snapshot_dir="apps/website/tests/visual/__snapshots__"
          if find "$snapshot_dir" -type f -name '*.png' -print -quit 2>/dev/null | grep -q .; then
            exit 0
          fi

          pnpm --filter @sistem-digital/website test:visual:update
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$snapshot_dir"
          git commit -m "test(visual): add initial interactive baselines"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          echo "Baseline-urile inițiale au fost create. Verificarea se va relansa pe commitul următor."
          exit 1

      - name: Compare versioned screenshots
        run: pnpm --filter @sistem-digital/website test:visual

      - name: Upload expected, actual and diff images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            apps/website/playwright-visual-report
            apps/website/test-results-visual
          if-no-files-found: ignore
          retention-days: 14
