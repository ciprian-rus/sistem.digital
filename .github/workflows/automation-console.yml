name: Automation Console

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  regenerate-lockfile:
    if: >-
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == 'ciprian-rus' &&
      startsWith(github.event.comment.body, '/automation regenerate-lockfile ')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Parse and validate target branch
        id: command
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        shell: bash
        run: |
          set -euo pipefail

          first_line="$(printf '%s\n' "${COMMENT_BODY}" | head -n 1)"
          prefix="/automation regenerate-lockfile "
          target_branch="${first_line#${prefix}}"

          if [ -z "${target_branch}" ] || [ "${target_branch}" = "${first_line}" ] || [[ "${target_branch}" =~ [[:space:]] ]]; then
            echo "Invalid target branch." >&2
            exit 1
          fi

          git check-ref-format --branch "${target_branch}" >/dev/null
          echo "target_branch=${target_branch}" >> "${GITHUB_OUTPUT}"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.command.outputs.target_branch }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Regenerate pnpm lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Commit lockfile when changed
        id: commit
        env:
          TARGET_BRANCH: ${{ steps.command.outputs.target_branch }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- pnpm-lock.yaml; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: regenerate pnpm lockfile"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "changed=true" >> "${GITHUB_OUTPUT}"

      - name: Report result on issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          TARGET_BRANCH: ${{ steps.command.outputs.target_branch }}
          CHANGED: ${{ steps.commit.outputs.changed }}
        shell: bash
        run: |
          if [ "${CHANGED}" = "true" ]; then
            message="✅ Lockfile regenerated and committed on \`${TARGET_BRANCH}\`."
          else
            message="✅ Lockfile on \`${TARGET_BRANCH}\` was already current."
          fi

          gh issue comment "${ISSUE_NUMBER}" --body "${message}"

      - name: Report failure on issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue comment "${ISSUE_NUMBER}" --body "❌ Lockfile automation failed. Inspect: ${RUN_URL}"
