name: Format pull request

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: format-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align accessibility build with workspace dependencies
        run: >-
          sed -i
          's|run: pnpm --filter @sistem-digital/website build|run: pnpm --filter @sistem-digital/tokens build \&\& pnpm --filter @sistem-digital/website build|'
          .github/workflows/ci.yml

      - name: Format canonical source files
        run: pnpm format

      - name: Generate derived token artifacts
        run: |
          pnpm --filter @sistem-digital/tokens tokens:generate
          pnpm --filter @sistem-digital/tokens themes:generate

      - name: Commit generated and formatted files when changed
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "Generated artifacts and formatting are current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore: synchronize generated artifacts"
          git push origin "HEAD:${TARGET_BRANCH}"
