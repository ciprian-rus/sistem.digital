name: Bootstrap pnpm lockfile

on:
  push:
    branches: [agent/m0-monorepo-foundation]
    paths:
      - .github/workflows/bootstrap-lockfile.yml
      - package.json
      - pnpm-workspace.yaml
      - apps/*/package.json
      - packages/*/package.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-lockfile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/m0-monorepo-foundation

      - name: Stop when lockfile already exists
        id: lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "pnpm-lock.yaml already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        if: steps.lockfile.outputs.exists == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node.js
        if: steps.lockfile.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Generate lockfile
        if: steps.lockfile.outputs.exists == 'false'
        run: pnpm install --lockfile-only

      - name: Commit lockfile
        if: steps.lockfile.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: add pnpm lockfile"
          git push
