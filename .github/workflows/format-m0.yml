name: Format M0 branch

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  format:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/m0-monorepo-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout M0 branch
        uses: actions/checkout@v4
        with:
          ref: agent/m0-monorepo-foundation

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format files
        run: pnpm format

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "Formatting is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "style: apply repository formatting"
          git push origin HEAD:agent/m0-monorepo-foundation
