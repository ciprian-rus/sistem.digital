packages:
  - apps/*
  - packages/*
  - starters/*

catalog:
  '@axe-core/playwright': 4.12.1
  '@changesets/cli': 2.31.0
  '@eslint/js': 10.0.1
  '@mdx-js/loader': 3.1.1
  '@mdx-js/react': 3.1.1
  '@next/mdx': 16.2.11
  '@playwright/test': 1.61.1
  '@types/mdx': 2.0.14
  '@types/node': 24.13.3
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  eslint: 10.7.0
  eslint-config-next: 16.2.11
  globals: 17.7.0
  next: 16.2.11
  prettier: 3.9.6
  react: 19.2.7
  react-dom: 19.2.8
  remark-frontmatter: 5.0.0
  remark-mdx-frontmatter: 5.2.0
  turbo: 2.10.5
  typescript: 5.9.3
  typescript-eslint: 8.65.0
  vitest: 4.1.10

overrides:
  # Next.js still resolves an older PostCSS release; 8.5.12 patches GHSA-6g55-p6wh-862q.
  postcss: 8.5.12
  # Next.js resolves sharp 0.34.x; 0.35.3 contains the reviewed libvips security fixes.
  sharp: 0.35.3

# pnpm 11 blocks dependency build scripts unless they are explicitly reviewed.
# sharp is required by Next.js for production image processing.
allowBuilds:
  sharp: true
