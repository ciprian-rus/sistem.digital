packages:
  - apps/*
  - packages/*
  - starters/*

catalog:
  '@changesets/cli': 2.31.0
  '@eslint/js': 10.0.1
  '@types/node': 24.13.3
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  eslint: 10.7.0
  eslint-config-next: 16.2.10
  globals: 17.7.0
  next: 16.2.10
  prettier: 3.9.6
  react: 19.2.7
  react-dom: 19.2.7
  turbo: 2.10.5
  typescript: 5.9.3
  typescript-eslint: 8.65.0
  vitest: 4.1.10

# pnpm 11 blocks dependency build scripts unless they are explicitly reviewed.
# sharp is required by Next.js for production image processing.
allowBuilds:
  sharp: true
