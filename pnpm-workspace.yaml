packages:
  - apps/*
  - packages/*
  - starters/*

catalog:
  '@axe-core/playwright': 4.12.1
  '@changesets/cli': 2.31.0
  '@eslint/js': 10.0.1
  '@playwright/test': 1.61.1
  '@types/node': 24.13.3
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  eslint: 10.7.0
  eslint-config-next: 16.2.11
  globals: 17.7.0
  next: 16.2.11
  prettier: 3.9.6
  react: 19.2.7
  react-dom: 19.2.7
  turbo: 2.10.5
  typescript: 5.9.3
  typescript-eslint: 8.65.0
  vitest: 4.1.10

overrides:
  # Next.js 16.2.10 resolves sharp 0.34.5; 0.35.3 contains the libvips security fixes.
  sharp: 0.35.3

# pnpm 11 blocks dependency build scripts unless they are explicitly reviewed.
# sharp is required by Next.js for production image processing.
allowBuilds:
  sharp: true
